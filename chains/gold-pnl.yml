# Gold PnL vertical — deterministic dry-run workflow against the existing
# OKF catalog in ../llm-wiki-dataproducts.
#
# Preview (writes nothing anywhere, not even run metadata):
#
#   uv run lineage-wiki generate --config chains/gold-pnl.yml \
#     --target-repo ../llm-wiki-dataproducts --dry-run
#
# The catalog's Gold PnL pages are hand-written and not tool-owned, so even
# a real run (without --dry-run) refuses to overwrite them: it only creates
# missing pages and the .lineage-wiki/ manifest. Source paths (raw docs,
# repo clone) resolve relative to the target repo root.
chain:
  id: gold-pnl
  name: Gold PnL
  domain: treasury
  owner: Treasury
  description: >-
    End-to-end Gold PnL computation: WAC, realized PnL per transaction type,
    unrealized MTM, and Binance futures hedging PnL, snapshotted daily to
    BigQuery.

sources:
  raw_docs:
    - path: raw_files/goldpnl/GoldPNLDoc.md
      type: methodology
      required: true
    - path: raw_files/goldpnl/raw_files_pnl.md
      type: notes
      required: false
  repos:
    - name: gold-pnl
      host: github
      url: https://github.com/rz0718/gold-pnl
      branch: main
      # Sibling clone next to the target repo. Optional: without it the
      # configured paths/symbols stay unverified references (Known Gap).
      local_path: ../gold-pnl
      required: false
      paths:
        - main_pnl.py
        - gold_pnl_utils.py
        - futures_hedging_pnl_report.py
      symbols:
        - calculate_framework_pnl_wac
        - load_filtered_transactions_for_pnl
        - load_futures_hedging_results
  bigquery:
    project: bem---beli-emas-murni
    tables:
      - bem---beli-emas-murni.treasury_da.gold_pnl_daily_snapshot
      - bem---beli-emas-murni.treasury_da.gold_spread_revenue_spread_cost
    include_sample_rows: false
    # Schema ingestion is best-effort: offline/credential-less runs record
    # the missing schemas as Known Gaps instead of failing.
    required: false
  reports:
    - name: Gold Daily PnL Report
      type: slack
      url: ""
      source_mapping_notes: >-
        Daily realized, unrealized, and total lines read the spot_* columns
        of treasury_da.gold_pnl_daily_snapshot; futures lines are excluded
        from the daily realized view.
    - name: Gold MTD PnL Report
      type: slack
      url: ""
      source_mapping_notes: >-
        Month-to-date cumulative totals over gold_pnl_daily_snapshot,
        including futures PnL converted to IDR at the live FX rate.
  human_notes:
    - title: Day Zero opening position
      content: >-
        PnL tracking starts 2025-10-20 11:20 JKT with opening WAC IDR
        2,753,000/gram and opening inventory 0 grams (the book is rebuilt
        from transaction flow). Futures PnL is counted from 2026-01-25 only.
  metrics:
    - name: Gold Daily Total PnL
      definition: >-
        spot_daily_total_idr = spot_realized_idr +
        spot_user_transaction_fee_idr + spot_unrealized_change_idr, one
        value per Jakarta calendar day.
      unit: IDR
      grain: daily

generation:
  output_dir: okf
  raw_files_dir: raw_files
  # update_existing only ever rewrites tool-owned pages (tracked in
  # .lineage-wiki/manifest.yml); hand-written pages are always protected.
  overwrite_policy: update_existing
  create_missing_metrics: true
  update_indexes: true
  require_citations: true
  mark_unknowns_as_gaps: true
  preserve_manual_sections: true

# Optional, credentialed verification — run separately via:
#   uv run lineage-wiki verify-bq --config chains/gold-pnl.yml \
#     --root ../llm-wiki-dataproducts
bigquery_verification:
  enabled: true
  mode: formula_check
  max_bytes_billed: 1000000000
  tables:
    - table: bem---beli-emas-murni.treasury_da.gold_pnl_daily_snapshot
      date_column: date
      expect_columns:
        - date
        - wac
        - inventory_g
        - spot_realized_idr
        - spot_unrealized_change_idr
        - spot_user_transaction_fee_idr
        - spot_daily_total_idr
        - fut_realized_usd
        - fut_unrealized_change_usd
        - fut_daily_total_usd
      numeric_columns: [wac, inventory_g, spot_daily_total_idr]
      null_columns: [wac, spot_daily_total_idr]
    - table: bem---beli-emas-murni.treasury_da.gold_spread_revenue_spread_cost
      date_column: date
      expect_columns:
        - date
        - gold_tx_gtv_idr
        - gold_tx_spread_revenue_idr
        - spread_cost_idr
        - gold_loan_penalty_revenue_plu
  sample_rows:
    enabled: false
  profiling:
    enabled: true
    date_window_days: 90
  formula_checks:
    enabled: true
    date_window_days: 90
    tolerance:
      absolute: 0.01
      relative: 0.0001
    checks:
      # Documented in okf/frameworks/gold-pnl.md and the daily snapshot
      # output page: spot daily total is the sum of realized PnL, user
      # transaction fees, and the daily change in unrealized MTM.
      - name: gold_daily_total_formula
        table: bem---beli-emas-murni.treasury_da.gold_pnl_daily_snapshot
        expression: spot_daily_total_idr
        expected_expression: >-
          spot_realized_idr + spot_user_transaction_fee_idr +
          spot_unrealized_change_idr
        date_column: date
      - name: gold_futures_daily_total_formula
        table: bem---beli-emas-murni.treasury_da.gold_pnl_daily_snapshot
        expression: fut_daily_total_usd
        expected_expression: fut_realized_usd + fut_unrealized_change_usd
        date_column: date
  store_results:
    okf_pages: summary_only
    run_metadata: detailed
